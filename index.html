};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.fbStore = {
  async get(k) {
    try {
      const snap = await getDoc(doc(db, "bookkeeping", k));
      return snap.exists() ? snap.data().value : null;
    } catch(e) { console.error(e); return null; }
  },
  async set(k, v) {
    try {
      await setDoc(doc(db, "bookkeeping", k), { value: v });
    } catch(e) { console.error(e); }
  },
  listen(k, cb) {
    return onSnapshot(doc(db, "bookkeeping", k), snap => {
      if (snap.exists()) cb(snap.data().value);
    });
  }
};

window.dispatchEvent(new Event("firebase-ready"));

function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res({name:file.name,type:file.type,size:file.size,data:r.result});
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

        !filteredInvs.length&&React.createElement("div",{style:{textAlign:"center",color:C.muted,fontSize:13,padding:40}},"No invoices match your filters.")
      )
    ),
    txForm&&React.createElement(TxFormModal,{init:txForm,onSave:saveTx,onClose:()=>setTxForm(null)}),
    invForm&&React.createElement(InvFormModal,{init:invForm,onSave:saveInv,onClose:()=>setInvForm(null)}),
    toast&&React.createElement("div",{style:{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",background:toast.ok?C.navy:C.red,color:C.white,padding:"10px 20px",borderRadius:10,fontSize:13,fontWeight:600,boxShadow:"0 4px 16px rgba(0,0,0,.2)",zIndex:100,pointerEvents:"none",whiteSpace:"nowrap"}},toast.msg)
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
