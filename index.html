    var invPrompt = "You are a bookkeeping assistant. Analyze this invoice document and extract the following fields as JSON only, no markdown, no explanation:\n{\"num\":\"invoice number\",\"client\":\"client name\",\"issued\":\"YYYY-MM-DD\",\"due\":\"YYYY-MM-DD\",\"amt\":number,\"cur\":\"USD or CAD\",\"notes\":\"line items or description summary\"}\nIf a field is unknown use empty string or 0. Return ONLY the JSON object.";

      content.push({type:"image",source:{type:"base64",media_type:mediaType,data:b64}});
    } else if (isPdf) {
      content.push({type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}});
    }
    content.push({type:"text",text:prompt});

      method:"POST",
      headers:{"Content-Type":"application/json"},

    .then(function(r){return r.json();})
    .then(function(data){
      var text = data.content && data.content[0] && data.content[0].text;

      var clean = text.replace(/```json|```/g,"").trim();

                    h('button',{onClick:function(){setInvForm(inv);},style:{fontSize:11,background:C.bg,color:C.slate,border:"1px solid "+C.border,borderRadius:6,padding:"4px 10px",cursor:"pointer"}},"Edit")
                  )
                )
              ),
              inv.docs&&inv.docs.length>0&&h('div',{style:{marginTop:10,paddingTop:10,borderTop:"1px solid "+C.border,display:"flex",flexWrap:"wrap",gap:6}},
                inv.docs.map(function(d,i){return h('div',{key:i,style:{display:"flex",alignItems:"center",gap:6,padding:"4px 10px",background:C.bg,borderRadius:6,border:"1px solid "+C.border,fontSize:11}},
                  h('span',null,d.type==="application/pdf"?"📄":"🖼"),h('span',{style:{color:C.navy}},d.name),
                  d.type==="application/pdf"?h('a',{href:d.data,download:d.name,style:{color:C.green,textDecoration:"none"}},"⬇ Save"):h('a',{href:d.data,target:"_blank",style:{color:C.green,textDecoration:"none"}},"👁 View")
                );})
              )
            );
          }),
          !filtInvs.length&&h('div',{style:{textAlign:"center",color:C.muted,fontSize:13,padding:40}},"No invoices match.")
        )
      ),
      txForm&&h(TxModal,{init:txForm,onSave:saveTx,onClose:function(){setTxForm(null);}}),
      invForm&&h(InvModal,{init:invForm,onSave:saveInv,onClose:function(){setInvForm(null);}}),
      toast&&h('div',{style:{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",background:toast.ok?C.navy:C.red,color:C.white,padding:"10px 20px",borderRadius:10,fontSize:13,fontWeight:600,boxShadow:"0 4px 16px rgba(0,0,0,.2)",zIndex:100,pointerEvents:"none",whiteSpace:"nowrap"}},toast.msg)
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

}); // firestore
}); // firebase-app
}); // react-dom
}); // react
</script>
</body>
</html>
